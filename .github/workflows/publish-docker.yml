name: publish-docker
run-name: Publish Docker Images
on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: false
        default: ""
permissions:
  packages: write
  contents: read
jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Tests and Build
        run: ./gradlew server:test server:shadowJar server:installDist -Pversion=${{ inputs.tag }}

      - uses: actions/upload-artifact@v7
        with:
          name: server-dist
          path: server/build/install/server

  lh-server:
    runs-on: ubuntu-latest
    needs:
      - build-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Server Binaries
        uses: actions/download-artifact@v8
        with:
          name: server-dist
          path: server/build/install/server

      - name: Build and Publish
        uses: littlehorse-enterprises/publish-image@v1
        with:
          image-name: lh-server
          dockerfile: docker/server/Dockerfile
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=latest,enable=false
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{version}}
            type=ref,event=branch,enable=${{ github.ref_name == 'master' }}

  lh-canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Tests and Build
        run: ./gradlew canary:installDist

      - name: Build and Publish
        uses: littlehorse-enterprises/publish-image@v1
        with:
          image-name: lh-canary
          dockerfile: docker/canary/Dockerfile
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=latest,enable=false
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{version}}
            type=ref,event=branch,enable=${{ github.ref_name == 'master' }}

  lhctl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and Publish
        uses: littlehorse-enterprises/publish-image@v1
        with:
          image-name: lhctl
          dockerfile: docker/lhctl/Dockerfile
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            VERSION=${{ inputs.tag || github.ref_name }}
            COMMIT=${{ github.sha }}
          tags: |
            type=raw,value=latest,enable=false
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{version}}
            type=ref,event=branch,enable=${{ github.ref_name == 'master' }}

  lh-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Update Dashboard Version
        working-directory: ./dashboard
        run: |
          if [ "${{ inputs.tag }}" != "" ]; then
            VERSION="${{ inputs.tag }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            VERSION="${{ github.ref_name }}-$SHORT_SHA"
          fi
          sed -i "s|NEXT_PUBLIC_VERSION: '.*'|NEXT_PUBLIC_VERSION: '$VERSION'|g" next.config.mjs

      - name: Build Dashboard
        working-directory: ./dashboard
        run: |
          pnpm install
          pnpm run build

      - name: Build and Publish
        uses: littlehorse-enterprises/publish-image@v1
        with:
          image-name: lh-dashboard
          dockerfile: docker/dashboard/Dockerfile
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=latest,enable=false
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{version}}
            type=ref,event=branch,enable=${{ github.ref_name == 'master' }}

  lh-standalone:
    runs-on: ubuntu-latest
    needs:
      - build-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Update Dashboard Version
        working-directory: ./dashboard
        run: |
          if [ "${{ inputs.tag }}" != "" ]; then
            VERSION="${{ inputs.tag }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            VERSION="${{ github.ref_name }}-$SHORT_SHA"
          fi
          sed -i "s|NEXT_PUBLIC_VERSION: '.*'|NEXT_PUBLIC_VERSION: '$VERSION'|g" next.config.mjs

      - name: Build Dashboard
        working-directory: ./dashboard
        run: |
          pnpm install
          pnpm run build

      - name: Download Server dist artifact
        uses: actions/download-artifact@v8
        with:
          name: server-dist
          path: server/build/install/server/

      - name: Build and Publish
        uses: littlehorse-enterprises/publish-image@v1
        with:
          image-name: lh-standalone
          dockerfile: docker/standalone/Dockerfile
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=latest,enable=false
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{version}}
            type=ref,event=branch,enable=${{ github.ref_name == 'master' }}
