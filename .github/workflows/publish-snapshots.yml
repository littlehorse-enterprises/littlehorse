name: publish-snapshots
run-name: Publish Snapshots (${{ github.ref_name }})
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - "[0-9]+.[0-9]+"

permissions:
  packages: write
  contents: write
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      snapshot-version: ${{ steps.compute_version.outputs.snapshot-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute snapshot version
        id: compute_version
        run: |
          version=$(grep "^version=" gradle.properties | cut -d= -f2)
          major_minor=$(echo "$version" | cut -d. -f1-2)
          snapshot_version="${major_minor}-SNAPSHOT"
          echo "snapshot-version=$snapshot_version" >> $GITHUB_OUTPUT
          echo "Computed snapshot version: $snapshot_version"

  publish-java-libraries:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"

      - name: Set snapshot version
        env:
          VERSION: ${{ needs.prepare.outputs.snapshot-version }}
        run: sed -i "s/version=.*/version=${VERSION}/g" gradle.properties

      - name: Validate snapshot format
        env:
          VERSION: ${{ needs.prepare.outputs.snapshot-version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -i -- '-SNAPSHOT$' >/dev/null; then
              echo "ERROR: version does not end with -SNAPSHOT" >&2
              exit 1
          fi

      - name: Tests
        run: ./gradlew sdk-java:test test-utils:test test-utils-container:test

      - name: Publish Snapshot
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.OSSRH_PASSWORD }}
        run: >
          ./gradlew
          sdk-java:publishToSonatype
          test-utils:publishToSonatype
          test-utils-container:publishToSonatype

  publish-docker:
    needs: prepare
    uses: ./.github/workflows/publish-docker.yml
    with:
      tag: ${{ needs.prepare.outputs.snapshot-version }}
