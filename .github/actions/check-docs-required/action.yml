name: 'Check Docs Required'
description: 'Check if documentation is required based on commit messages or PR labels'
inputs:
  check_mode:
    description: 'Mode to check: "commit" for commit messages, "label" for PR labels, "both" for either'
    required: false
    default: 'both'
  commit_sha:
    description: 'Specific commit SHA to check (optional, defaults to HEAD)'
    required: false
    default: ''
outputs:
  docs_required:
    description: 'Whether documentation is required'
    value: ${{ steps.check.outputs.docs_required }}
  commits:
    description: 'Space-separated list of commits requiring documentation'
    value: ${{ steps.check.outputs.commits }}
runs:
  using: 'composite'
  steps:
    - name: Check for docs-required
      id: check
      shell: bash
      run: |
        ${{ github.action_path }}/check-docs-required.sh
      env:
        CHECK_MODE: ${{ inputs.check_mode }}
        COMMIT_SHA: ${{ inputs.commit_sha }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
