syntax = "proto3";
package littlehorse;

option java_multiple_files = true;
option java_package = "io.littlehorse.common.proto";

import "object_id.proto";
import "bulk_job.proto";
import "google/protobuf/timestamp.proto";

message BulkUpdateJob {
  int32 partition = 1;
  string start_key = 2;
  string end_key = 3;
  optional string resume_from_key = 5;
  // Will contain a "iter_type"

  oneof job {
    NoOpJob no_op = 6;
    BulkDeleteWfRunJob bulk_delete_wf_run = 7;
  }
}

message NoOpJob {
  // Will be removed in the future when we add an actual job
}

// Internal job for bulk deleting WfRun's. Used by the BulkJobShard punctuator.
message BulkDeleteWfRunJob {
  // The BulkJob this deletion belongs to.
  BulkJobId bulk_job_id = 1;

  // The criteria for which WfRun's to delete.
  BulkDeleteWfRun criteria = 2;
}

// Internal storeable that tracks the range scan cursor for a BulkJobShard.
// Not exposed via the public API.
message BulkJobShardCursor {
  // The BulkJob this cursor belongs to.
  BulkJobId bulk_job_id = 1;

  // The last iterated key in the range scan. Empty means scan hasn't started yet.
  string last_key = 2;

  // Whether the scan has completed for this shard.
  bool scan_completed = 3;
}

// ID for an ActiveBulkJob registry entry.
message ActiveBulkJobId {
  // The BulkJob this entry references.
  BulkJobId bulk_job_id = 2;
  // The tenant that owns this BulkJob.
  TenantId tenant_id = 3;

}

// Cluster-scoped internal registry entry that signals a BulkJob is currently active.
// Created when a BulkJob starts; deleted when it completes or fails.
// The punctuator iterates these to discover work without needing to scan per-tenant.
message ActiveBulkJob {
  // The ID of this registry entry (same as the BulkJob ID).
  ActiveBulkJobId id = 1;

  // When this entry was created.
  google.protobuf.Timestamp created_at = 2;
}

