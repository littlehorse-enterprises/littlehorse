syntax = "proto3";

package littlehorse;

import "object_id.proto";
import "common_enums.proto";
import "google/protobuf/timestamp.proto";

option go_package = ".;lhproto";
option java_multiple_files = true;
option java_package = "io.littlehorse.sdk.common.proto";
option csharp_namespace = "LittleHorse.Sdk.Common.Proto";

// Defines the type of a value in LittleHorse. Can be used for Task Parameters,
// Task return types, External Event types, ThreadSpec variables, etc.
message TypeDefinition {
  // The type of this definition. One of the following will be set.
  //
  // Note: if no `defined_type` is set, defaults to a `primitive_type` of `JSON_OBJ`
  // to support old clients from 0.14.1 or lower.
  oneof defined_type {
    // The primitive type definition.
    VariableType primitive_type = 1;
    
    // The ID of the StructDef that defines this type.
    StructDefId struct_def_id = 5;

    // An inline Array definition.
    InlineArrayDef inline_array_def = 6;

    // An inline Struct definition.
    InlineStructDef inline_struct_def = 7;
  }

  // For compatibility purposes.
  reserved 2, 3;

  // Set to true if values of this type contain sensitive information and must be masked.
  bool masked = 4;
}

// Inline schema definition for a native LittleHorse Array.
message InlineArrayDef {
  // Type definition for each element in the array.
  TypeDefinition array_type = 1;
}

// A map of InlineStructDef's field names to their StructFieldDef's.
message InlineStructDef {
  // The fields in this schema.
  map<string, StructFieldDef> fields = 1;
}

// The definition of a field in an InlineStructDef.
message StructFieldDef {
  // The type of the field.
  TypeDefinition field_type = 1;
  
  // The default value of the field, which should match the Field Type. If not
  // provided, then the field is treated as required.
  optional VariableValue default_value = 2;

  // If true, then the field is treated as nullable, and its value may be set to null.
  bool is_nullable = 3;
}

// VariableValue is a structure containing a value in LittleHorse. It can be
// used to pass input variables into a WfRun/ThreadRun/TaskRun/etc, as output
// from a TaskRun, as the value of a WfRun's Variable, etc.
message VariableValue {
  reserved 1;

  // The value held in this VariableValue. If this is unset, treat it as
  // a NULL.
  oneof value {
    // A String representing a serialized json object.
    string json_obj = 2;

    // A String representing a serialized json list.
    string json_arr = 3;

    // A 64-bit floating point number.
    double double = 4;

    // A boolean.
    bool bool = 5;

    // A string.
    string str = 6;

    // The `INT` variable type is stored as a 64-bit integer. The
    // `INT` can be cast to a `DOUBLE`.
    int64 int = 7;

    // An arbitrary String of bytes.
    bytes bytes = 8;

    // Reference to a WfRunId
    WfRunId wf_run_id = 9;

    // A timestamp (UTC)
    google.protobuf.Timestamp utc_timestamp = 10;

    // A Struct object.
    Struct struct = 11;

    // An Array object.
    Array array = 12;
  }
}

// An Array is a strongly-typed list of values.
message Array {
  repeated VariableValue items = 1;
  
  // Optional, authoritative element type for this array.
  // Stored alongside the items for ease of access, since we often need to know the element type when processing the items on the server.
  // If absent, element type may be unknown and must be derived from items or treated as wildcard.
  optional TypeDefinition element_type = 2;
}

// A Struct is a strongly-typed structure containing fields. The Struct is defined
// according to the `Schema` object.
message Struct {
  // The id of the schema.
  StructDefId struct_def_id = 1;
  // The content of the Struct
  InlineStruct struct = 2;
}

// An `InlineStruct` is a pre-validated set of fields that are part of a `Struct`.
message InlineStruct {
  // The fields in the inline struct.
  map<string, StructField> fields = 1;
}

// A StructField represents the value for a single field in a struct.
message StructField {
  // The `value` of the field is an untyped `VariableValue`.
  VariableValue value = 1;

  // Whether or not this StructField value is masked.
  // Set by the server based on the StructDef's field definition for this configuration.
  bool masked = 2;
}

// Utility used among metadata objects to define their output type. For example, used in
// TaskDef and ExternalEventDef to represent the output.
message ReturnType {
  // The type of the output. If it is not present, it is interpred as the output type
  // being void: the TaskRun output/ExternalEvent/WorkflowEvent is always empty / NULL.
  optional TypeDefinition return_type = 1;
}

// Operator for comparing two values to create a boolean expression.
enum Comparator {
  // Equivalent to `<`. Only valid for primitive types (no JSON_OBJ or JSON_ARR).
  LESS_THAN = 0;

  // Equivalent to `>`. Only valid for primitive types (no JSON_OBJ or JSON_ARR).
  GREATER_THAN = 1;

  // Equivalent to `<=`. Only valid for primitive types (no JSON_OBJ or JSON_ARR).
  LESS_THAN_EQ = 2;

  // Equivalent to `>=`. Only valid for primitive types (no JSON_OBJ or JSON_ARR).
  GREATER_THAN_EQ = 3;

  // This is valid for any variable type, and is similar to .equals() in Java.
  //
  // One note: if the RHS is a different type from the LHS, then LittleHorse will
  // try to cast the RHS to the same type as the LHS. If the cast fails, then the
  // ThreadRun fails with a VAR_SUB_ERROR.
  EQUALS = 4;

  // This is the inverse of `EQUALS`
  NOT_EQUALS = 5;

  // Only valid if the RHS is a JSON_OBJ, JSON_ARR, or ARRAY. Valid for any type on the LHS.
  //
  // For the JSON_OBJ type, this returns true if the LHS is equal to a *KEY* in the
  // RHS. For the JSON_ARR and ARRAY types, it returns true if one of the elements of the RHS
  // is equal to the LHS.
  IN = 6;

  // The inverse of IN.
  NOT_IN = 7;
}
