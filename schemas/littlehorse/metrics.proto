syntax = "proto3";
package littlehorse;

import "google/protobuf/timestamp.proto";
import "object_id.proto";

option go_package = ".;lhproto";
option java_multiple_files = true;
option java_package = "io.littlehorse.sdk.common.proto";
option csharp_namespace = "LittleHorse.Sdk.Common.Proto";

// Identifies a metrics window for a workflow/task/user-task object.
// `window_start` marks the window start; `tenant_id` is optional.
message MetricWindowId {
  oneof id {
    WfSpecId  wf_spec_id  = 1;
    TaskDefId task_def_id = 2;
    UserTaskDefId user_task_def_id = 3;
  }

  optional TenantId tenant_id = 6;

  google.protobuf.Timestamp window_start = 7;

}

// Aggregate counts and latency stats for a metric window. Use
// `total_latency_ms / count` to compute average latency.
message CountAndTiming {
  int32 count            = 1;
  int64 min_latency_ms   = 2;
  int64 max_latency_ms   = 3;
  int64 total_latency_ms = 4;
}

// Aggregated metrics for a workflow or task within a time window.
// Only one of `workflow` or `task` will be populated.
message MetricWindow {
  MetricWindowId              id      = 1;

  oneof metric {
    WfMetrics workflow = 2;
    TaskMetrics task = 3;
  }
}

// Workflow-level aggregates for lifecycle transitions; fields are `CountAndTiming`.
message WfMetrics{
  CountAndTiming started = 1;
  CountAndTiming running_to_completed = 2;
  CountAndTiming running_to_error = 3;
  CountAndTiming running_to_exception = 4;
  CountAndTiming running_to_halting = 5;
  CountAndTiming halting_to_halted = 6;
}

// Task-level aggregates for task lifecycle transitions; fields are `CountAndTiming`.
message TaskMetrics{
  CountAndTiming taskrun_created_to_completed = 1;
  CountAndTiming taskrun_created_to_error = 2;
  CountAndTiming taskrun_created_to_exception = 3;
  CountAndTiming taskattempt_pending_to_scheduled = 4;
  CountAndTiming taskattempt_scheduled_to_running = 5;
  CountAndTiming taskattempt_running_to_error = 6;
  CountAndTiming taskattempt_running_to_success = 7;
  CountAndTiming taskattempt_running_to_exception = 8;
}

message ListWfMetricsRequest {
  WfSpecId                           wf_spec      = 1;
  optional google.protobuf.Timestamp window_start = 2;
  optional google.protobuf.Timestamp window_end   = 3;
}
message ListTaskMetricsRequest {
  TaskDefId task_def = 1;
  optional google.protobuf.Timestamp window_start = 2;
  optional google.protobuf.Timestamp window_end   = 3;
}

message MetricsList {
  repeated MetricWindow windows = 1;
}